    <script>
        class ThemeManager {
            constructor() {
                this.theme = localStorage.getItem('theme') || 'light';
                this.init();
            }
            init() {
                this.setTheme(this.theme);
                const themeToggle = document.getElementById('theme-toggle');
                if (themeToggle) themeToggle.addEventListener('click', () => this.toggleTheme());
            }
            setTheme(theme) {
                this.theme = theme;
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('theme', theme);
                const themeToggle = document.getElementById('theme-toggle');
                if (themeToggle) {
                    const sun = themeToggle.querySelector('.sun-icon');
                    const moon = themeToggle.querySelector('.moon-icon');
                    if (sun && moon) {
                        sun.style.display = theme === 'dark' ? 'block' : 'none';
                        moon.style.display = theme === 'dark' ? 'none' : 'block';
                    }
                }
            }
            toggleTheme() { this.setTheme(this.theme === 'light' ? 'dark' : 'light'); }
        }

        function parseMarkdown(markdown) {
            let html = markdown;
            const codeBlocks = [];
            const inlineCode = [];

            // 1. Protect code
            html = html.replace(/```[\s\S]*?```/g, m => {
                let code = m.substring(3, m.length - 3).trim();
                code = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                codeBlocks.push(`<pre><code>${code}</code></pre>`);
                return `___CODEBLOCK_${codeBlocks.length - 1}___`;
            });
            html = html.replace(/`([^`\n]+)`/g, (m, c) => {
                c = c.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                inlineCode.push(`<code>${c}</code>`);
                return `___INLINECODE_${inlineCode.length - 1}___`;
            });

            // 2. Formatting & Headers
            html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gim, '<h2 class="title">$1</h2>');
            html = html.replace(/^# (.*$)/gim, '<h1 class="title">$1</h1>');
            html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" loading="lazy" />');
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" class="cactus-link">$1</a>');

            // 3. Nested Lists State Machine
            const lines = html.split('\n');
            let result = [];
            let listStack = []; // Stores { indent, type ('ul' or 'ol') }

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];
                const ulMatch = line.match(/^(\s*)([\-\*])\s+(.+)$/);
                const olMatch = line.match(/^(\s*)(\d+\.)\s+(.+)$/);
                const isList = ulMatch || olMatch;

                if (isList) {
                    const match = ulMatch || olMatch;
                    const indent = match[1].length;
                    const type = ulMatch ? 'ul' : 'ol';
                    const content = match[3];

                    // Current nesting level
                    let currentLevel = listStack.length > 0 ? listStack[listStack.length - 1].indent : -1;

                    if (indent > currentLevel) {
                        // Go Deeper
                        listStack.push({ indent, type });
                        result.push(`<${type}><li>${content}`);
                    } else if (indent < currentLevel) {
                        // Go Shallower
                        while (listStack.length > 0 && listStack[listStack.length - 1].indent > indent) {
                            result.push(`</li></${listStack.pop().type}>`);
                        }
                        result.push(`</li><li>${content}`);
                    } else {
                        // Same Level
                        result.push(`</li><li>${content}`);
                    }
                } else {
                    // Not a list line - Close all open lists
                    while (listStack.length > 0) {
                        result.push(`</li></${listStack.pop().type}>`);
                    }
                    result.push(line);
                }
            }
            // Close any remaining lists
            while (listStack.length > 0) {
                result.push(`</li></${listStack.pop().type}>`);
            }
            html = result.join('\n');

            // 4. Paragraphs (Don't wrap list/header tags)
            const paragraphs = html.split(/\n\s*\n/);
            html = paragraphs.map(p => {
                p = p.trim();
                if (!p) return '';
                if (/^<(ul|ol|li|h|pre|hr|img|div)/.test(p)) return p;
                if (p.includes('___CODEBLOCK_')) return p;
                return `<p>${p}</p>`;
            }).join('\n\n');

            html = html.replace(/^---$/gm, '<hr>');

            // 5. Restore code
            inlineCode.forEach((c, i) => html = html.replace(`___INLINECODE_${i}___`, c));
            codeBlocks.forEach((c, i) => html = html.replace(`___CODEBLOCK_${i}___`, c));

            return html;
        }

        async function loadPost() {
            const urlParams = new URLSearchParams(window.location.search);
            const postPath = urlParams.get('post');
            const contentElement = document.getElementById('post-content');
            if (!postPath) {
                contentElement.innerHTML = '<p>No post specified. <a href="index.html#publications" class="cactus-link">Go back</a></p>';
                return;
            }
            try {
                const response = await fetch(postPath);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const markdown = await response.text();
                let html = parseMarkdown(markdown);
                const postDir = postPath.substring(0, postPath.lastIndexOf('/') + 1);
                html = html.replace(/src="(\.\.\/)+([^"]+)"/g, (m, dots, rel) => {
                    let dir = postDir;
                    for (let i = 0; i < m.split('../').length - 1; i++) dir = dir.substring(0, dir.lastIndexOf('/', dir.length - 2) + 1);
                    return `src="${dir}${rel}"`;
                });
                html = html.replace(/src="\.\/([^"]+)"/g, `src="${postDir}$1"`);
                contentElement.innerHTML = html;
                const h1 = contentElement.querySelector('h1');
                if (h1) document.title = h1.textContent + ' - Yash Panchal';
            } catch (e) {
                contentElement.innerHTML = `<p>Error loading post: ${e.message}</p>`;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new ThemeManager();
            loadPost();
        });
    </script>
